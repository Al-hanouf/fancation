<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الدوال الذكية | أ. الهنوف الشعلان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #161b2a;
            --main-color: #00d2ff;
            --orange: #f59e0b;
            --green: #10b981;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; padding: 20px 0; margin-bottom: 25px; border-bottom: 1px solid #1e293b; }
        h1 { color: var(--main-color); text-shadow: 0 0 10px rgba(0,210,255,0.3); }

        .tabs { display: flex; gap: 15px; margin-bottom: 40px; justify-content: center; flex-wrap: wrap; }
        .tab-btn {
            background: var(--card-bg); border: 2px solid #334155; color: white;
            padding: 18px 35px; border-radius: 15px; cursor: pointer; 
            font-weight: bold; font-size: 1.4rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--main-color); color: #000; border-color: var(--main-color); box-shadow: 0 0 25px var(--main-color); }

        .content-section { display: none; animation: fadeIn 0.5s ease; }
        .content-section.active { display: block; }

        .factory-line { display: flex; gap: 20px; justify-content: space-between; align-items: stretch; margin-top: 20px; }
        .panel {
            background: rgba(255,255,255,0.03); border-radius: 25px; padding: 25px; 
            flex: 1; border: 3px solid; text-align: center; min-height: 420px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .panel-orange { border-color: var(--orange); }
        .panel-blue { border-color: var(--main-color); }
        .panel-green { border-color: var(--green); }

        .arg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .arg-btn {
            background: #1e293b; border: 1px solid #334155; color: white;
            padding: 15px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; transition: 0.2s;
        }
        .arg-btn.selected { background: var(--orange); color: black; font-weight: bold; border-color: white; }

        .code-display {
            background: #000; padding: 20px; border-radius: 15px; text-align: left;
            direction: ltr; font-family: 'Fira Code', monospace; color: #61afef; font-size: 1.1rem; line-height: 1.6;
        }

        .run-factory-btn {
            background: var(--main-color); color: #000; border: none; padding: 18px;
            border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s;
        }

        .final-res { font-family: 'Fira Code', monospace; font-size: 1.6rem; color: var(--green); padding: 20px; }
        .error-msg { color: var(--red); font-weight: bold; font-size: 1.2rem; }

        .challenge-card { 
            background: var(--card-bg); padding: 40px; border-radius: 30px; 
            border: 1px solid #334155; max-width: 850px; margin: 0 auto; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .code-block { background: #000; padding: 25px; border-radius: 15px; direction: ltr; text-align: left; margin: 20px 0; font-family: 'Fira Code'; font-size: 1.2rem; color: #d1d5db; border-left: 5px solid var(--main-color); }
        
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .opt-btn { background: transparent; border: 2px solid var(--main-color); color: var(--main-color); padding: 15px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .opt-btn.correct { background: var(--green); border-color: var(--green); color: white; }
        .opt-btn.wrong { background: var(--red); border-color: var(--red); color: white; }

        .solution-box { display: none; background: rgba(16, 185, 129, 0.1); border: 2px dashed var(--green); padding: 20px; border-radius: 15px; margin-top: 20px; color: var(--green); text-align: right; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏭 منصة الدوال المتكاملة</h1>
        <p>بإشراف أستاذة: الهنوف الشعلان</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'factory')">🏰 خط الإنتاج</button>
        <button class="tab-btn" onclick="openTab(event, 'speed')">⚡ تحدي السرعة</button>
        <button class="tab-btn" onclick="openTab(event, 'bugs')">🪲 صيد الثغرات</button>
    </div>

    <div id="factory" class="content-section active">
        <h2 style="text-align:center; color:var(--main-color); margin-bottom:30px;">⚙️ الجولة الأولى: مصنع الأكواد الذكي</h2>
        <div style="text-align:center; margin-bottom:25px;">
            <label style="font-size: 1.2rem; margin-left: 10px;">اختر نوع الدالة: </label>
            <select id="funcType" onchange="updateCodeTemplate()" style="padding:12px; border-radius:10px; background:#1e293b; color:white; border:2px solid var(--main-color); font-family:'Tajawal';">
                <option value="welcome">دالة الترحيب (Welcome)</option>
                <option value="double">دالة المضاعفة (Double)</option>
                <option value="weather">دالة الجو (Weather)</option>
                <option value="parity">دالة الزوجي والفردي (Parity)</option>
            </select>
        </div>
        <div class="factory-line">
            <div class="panel panel-orange">
                <h3>1. المدخلات (Arguments) 📥</h3>
                <div class="arg-grid" id="argContainer"></div>
            </div>
            <div class="panel panel-blue">
                <h3>2. المعالجة (Function Body) ⚙️</h3>
                <div id="codeArea" class="code-display"></div>
                <button class="run-factory-btn" onclick="runSmartFactory()">⚙️ تشغيل المصنع (Call)</button>
            </div>
            <div class="panel panel-green">
                <h3>3. المخرجات (Return Value) 📤</h3>
                <div id="smartResult" class="final-res">// بانتظار التشغيل</div>
            </div>
        </div>
    </div>

    <div id="speed" class="content-section">
        <div class="challenge-card">
            <div id="start-screen">
                <h2 style="font-size:2rem; color:var(--main-color);">🚀 تحدي سرعة الدوال</h2>
                <button onclick="startGame()" style="background:var(--main-color); border:none; padding:15px 45px; border-radius:50px; cursor:pointer; font-weight:bold; font-size:1.4rem; margin-top:20px;">ابدأ التحدي!</button>
            </div>
            <div id="game-play" style="display:none;">
                <div id="timer" style="font-size:3rem; color:var(--red); font-weight:bold; margin-bottom:10px;">20</div>
                <div id="speed-code-display" class="code-block"></div>
                <div id="options-container" class="opt-grid"></div>
                <h3 id="score-display" style="margin-top:30px; color:var(--orange); font-size:1.5rem;">النقاط: 0</h3>
            </div>
        </div>
    </div>

    <div id="bugs" class="content-section">
        <div class="challenge-card">
            <h2 style="color:var(--red); margin-bottom:10px;">🪲 اكتشاف الثغرات البرمجية</h2>
            <div id="bug-title" style="color:var(--orange); font-size:1.4rem; font-weight:bold;"></div>
            <div id="bug-code-area" class="code-block"></div>
            <button id="show-sol-btn" onclick="toggleSolution()" style="background:var(--green); border:none; padding:12px 30px; border-radius:10px; color:white; cursor:pointer; font-weight:bold; font-size:1.1rem; margin-bottom:15px;">💡 إظهار الحل الذكي</button>
            <div id="solution-text" class="solution-box"></div>
            <div style="display:flex; justify-content:space-between; margin-top:30px; border-top:1px solid #334155; padding-top:20px;">
                <button onclick="prevBug()" style="background:#334155; border:none; color:white; padding:12px 25px; border-radius:10px; cursor:pointer;">السابق</button>
                <span id="bug-count" style="font-weight:bold; font-size:1.2rem;">1 / 3</span>
                <button onclick="nextBug()" style="background:#334155; border:none; color:white; padding:12px 25px; border-radius:10px; cursor:pointer;">التالي</button>
            </div>
        </div>
    </div>
</div>

<script>
    function openTab(evt, name) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    const factoryData = {
        welcome: { code: 'function welcome($data) {\n  return "أهلاً " . $data;\n}', args: [['ساره', '"ساره"'], ['نوره', '"نوره"'], ['emoji', '77'], ['emoji', '100']] },
        double: { code: 'function double($n) {\n  return $n * 2;\n}', args: [[5, '5'], [10, '10'], [25, '25'], ['ABC', '"sara"']] },
        weather: { code: 'function checkTemp($deg) {\n  return ($deg > 30) ? "الجو حار 🔥" : "الجو بارد ❄️";\n}', args: [[40, '40'], [15, '15'], [32, '32'], [5, '5']] },
        parity: { code: 'function check($n) {\n  return ($n % 2 == 0) ? "زوجي" : "فردي";\n}', args: [[2, '2'], [7, '7'], [14, '14'], [21, '21']] }
    };

    let selectedValue = null;
    function updateCodeTemplate() {
        const type = document.getElementById('funcType').value;
        const data = factoryData[type];
        document.getElementById('codeArea').innerText = data.code;
        const argContainer = document.getElementById('argContainer');
        argContainer.innerHTML = ''; selectedValue = null;
        document.getElementById('smartResult').innerText = "// بانتظار التشغيل";
        data.args.forEach(item => {
            const btn = document.createElement('button'); btn.className = 'arg-btn'; btn.innerText = item[1];
            btn.onclick = () => { selectedValue = item[0]; document.querySelectorAll('.arg-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
            argContainer.appendChild(btn);
        });
    }

    function runSmartFactory() {
        const res = document.getElementById('smartResult');
        const type = document.getElementById('funcType').value;
        if (selectedValue === null) { res.innerHTML = '<span class="error-msg">⚠️ حددي مدخلاً</span>'; return; }
        
        res.innerText = "Processing...";
        setTimeout(() => {
            if (selectedValue === 'emoji' || selectedValue === 'ABC') {
                res.innerHTML = '<span class="error-msg">Fatal Error:<br>Invalid Data Type</span>';
            } else {
                let finalOutput = "";
                // تحويل المدخل إلى رقم إذا كان عدداً فعلياً (مثل 100) لضمان المعالجة الصحيحة
                let val = (typeof selectedValue === "number") ? selectedValue : selectedValue;

                if(type === 'welcome') finalOutput = "أهلاً " + val;
                else if(type === 'double') finalOutput = Number(val) * 2;
                else if(type === 'weather') finalOutput = (Number(val) > 30) ? "الجو حار 🔥" : "الجو بارد ❄️";
                else if(type === 'parity') finalOutput = (Number(val) % 2 == 0) ? "زوجي" : "فردي";

                res.innerText = finalOutput;
                res.style.color = "var(--green)";
            }
        }, 500);
    }
    updateCodeTemplate();

    // --- تحدي السرعة وصيد الثغرات (نفس الكود السابق المستقر) ---
    const speedQuestions = [
        { q: "function hi($n) { echo 'Hi '.$n; }\nhi('Afnan');", opts: ["Hi Afnan", "Hi $n", "Afnan", "Error"], a: "Hi Afnan" },
        { q: "function add($a, $b) { $sum = $a+$b; echo $sum; }\nadd(5, 3);", opts: ["8", "53", "5", "10"], a: "8" },
        { q: "function d($n) { echo $n*2; }\nd(4);", opts: ["8", "16", "4", "2"], a: "8" }
    ];
    let curS = 0; let sScore = 0; let sTimer; 
    function startGame() { document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-play').style.display = 'block'; curS = 0; sScore = 0; showSQ(); }
    function showSQ() {
        if (curS >= speedQuestions.length) { endSG(); return; }
        let tLeft = 20; document.getElementById('timer').innerText = tLeft;
        clearInterval(sTimer);
        sTimer = setInterval(() => { tLeft--; document.getElementById('timer').innerText = tLeft; if(tLeft <= 0) { clearInterval(sTimer); nextSQ(); } }, 1000);
        const q = speedQuestions[curS];
        document.getElementById('speed-code-display').innerText = q.q;
        const optC = document.getElementById('options-container'); optC.innerHTML = '';
        q.opts.forEach(o => {
            const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = o;
            btn.onclick = () => { clearInterval(sTimer); if(o === q.a) { btn.classList.add('correct'); sScore++; } else btn.classList.add('wrong'); setTimeout(nextSQ, 800); };
            optC.appendChild(btn);
        });
       
    }
    function nextSQ() { curS++; showSQ(); }
    function endSG() { document.getElementById('speed-code-display').innerHTML = "انتهى التحدي!"; document.getElementById('options-container').innerHTML = ''; }

    const bugQuestions = [
        { title: "الثغرة 1: هيكلة الدالة", code: "func check($v) [\n  if ($v == 1) {\n    return 'Done';\n  }\n]", sol: "1. تغيير 'func' إلى 'function'.<br>2. تغيير الأقواس '[]' إلى '{}'.<br>3. استخدام 'echo' بدلاً من 'return' للعرض المباشر." },
        { title: "الثغرة 2: المقارنة المنطقية", code: "function validate($user) {\n  if ($user = 'admin') \n    echo 'Welcome';\n}", sol: "الخطأ في استخدام '=' (تخصيص قيمة) داخل الـ if. الصحيح هو استخدام '==' للمقارنة." },
        { title: "الثغرة 3: استدعاء المتغير الخاطئ", code: "function welcomeUser($name) {\n  echo 'أهلاً بك يا ' . '$name';\n}\n\nwelcomeUser('الهنوف');", sol: "الخطأ هو وضع '$name' داخل علامات تنصيص مفردة؛ هنا سيطبع البرنامج النص حرفياً ($name). الحل هو كتابة المتغير بدون علامات تنصيص." }
    ];
    let curB = 0;
    function loadB() {
        const b = bugQuestions[curB]; document.getElementById('bug-title').innerText = b.title;
        document.getElementById('bug-code-area').innerText = b.code;
        document.getElementById('solution-text').innerHTML = b.sol;
        document.getElementById('solution-text').style.display = 'none';
        document.getElementById('bug-count').innerText = `${curB + 1} / ${bugQuestions.length}`;
    }
    function toggleSolution() { const s = document.getElementById('solution-text'); s.style.display = (s.style.display === 'none') ? 'block' : 'none'; }
    function nextBug() { if(curB < bugQuestions.length - 1) { curB++; loadB(); } }
    function prevBug() { if(curB > 0) { curB--; loadB(); } }
    loadB();
</script>
</body>
</html>
